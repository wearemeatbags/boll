name: Deploy versioned game to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: wearemeatbags/wearemeatbags.github.io/.github/workflows/versioned-game-pages.yml@main
    with:
      game: boll
      node_version: "24"
      install_command: npm ci
      build_command: npm run build
      output_directory: dist
