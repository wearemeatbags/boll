<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">An interactive juggling game: keep a bouncing ball on a single paddle that follows your pointer, with adjustable ball physics.</h2>
<style>
.pj-wrap{max-width:720px;margin:0 auto;font-family:"Courier New",ui-monospace,Menlo,monospace;-webkit-user-select:none;user-select:none;}
.pj-stage{position:relative;line-height:0;background:#000;border:1px solid var(--border-strong,#888);}
.pj-stage canvas{display:block;touch-action:none;cursor:crosshair;}
.pj-btn{font-family:inherit;font-weight:700;font-size:11px;letter-spacing:1px;color:#fff;background:#000;border:2px solid #fff;padding:6px 10px;cursor:pointer;line-height:1;border-radius:0;}
.pj-btn:active{background:#fff;color:#000;}
.pj-menu-btn{position:absolute;top:10px;right:10px;z-index:2;}
.pj-panel{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);}
.pj-panel[hidden]{display:none!important;}
.pj-card{background:#000;border:2px solid #fff;color:#fff;width:min(360px,94%);max-height:94%;overflow:auto;padding:14px 16px;line-height:1.3;}
.pj-title{text-align:center;font-weight:700;letter-spacing:3px;font-size:13px;margin-bottom:10px;}
.pj-row{display:grid;grid-template-columns:88px 1fr 52px;gap:8px;align-items:center;margin:9px 0;font-size:11px;letter-spacing:1px;}
.pj-val{text-align:right;font-weight:700;}
.pj-row input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:16px;background:transparent;margin:0;padding:0;border:0;}
.pj-row input[type=range]::-webkit-slider-runnable-track{height:4px;background:#fff;border-radius:0;}
.pj-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;background:#fff;border:0;border-radius:0;margin-top:-4.5px;}
.pj-row input[type=range]::-moz-range-track{height:4px;background:#fff;}
.pj-row input[type=range]::-moz-range-thumb{width:13px;height:13px;background:#fff;border:0;border-radius:0;}
.pj-presets{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
.pj-presets .pj-btn{font-size:10px;padding:5px 6px;flex:1;}
.pj-actions{display:flex;gap:6px;justify-content:space-between;margin-top:12px;}
</style>
<div class="pj-wrap" id="pjWrap">
  <div class="pj-stage" id="pjStage">
    <canvas id="pjCanvas"></canvas>
    <button class="pj-btn pj-menu-btn" id="pjMenuBtn" aria-label="Open ball physics settings">PHYSICS</button>
    <div class="pj-panel" id="pjPanel" hidden>
      <div class="pj-card">
        <div class="pj-title">BALL PHYSICS</div>
        <div class="pj-row"><span>GRAVITY</span><input id="pjGravity" type="range" min="200" max="4000" step="50" aria-label="Gravity"><span class="pj-val" id="pjGravityV"></span></div>
        <div class="pj-row"><span>BOUNCE</span><input id="pjBounce" type="range" min="0.3" max="1.1" step="0.01" aria-label="Bounciness"><span class="pj-val" id="pjBounceV"></span></div>
        <div class="pj-row"><span>BALL SIZE</span><input id="pjSize" type="range" min="10" max="48" step="1" aria-label="Ball size"><span class="pj-val" id="pjSizeV"></span></div>
        <div class="pj-row"><span>PADDLE PWR</span><input id="pjPower" type="range" min="0" max="2" step="0.05" aria-label="Paddle momentum transfer"><span class="pj-val" id="pjPowerV"></span></div>
        <div class="pj-row"><span>AIR DRAG</span><input id="pjDrag" type="range" min="0" max="1" step="0.01" aria-label="Air drag"><span class="pj-val" id="pjDragV"></span></div>
        <div class="pj-row"><span>PADDLE W</span><input id="pjWidth" type="range" min="60" max="220" step="5" aria-label="Paddle width"><span class="pj-val" id="pjWidthV"></span></div>
        <div class="pj-presets">
          <button class="pj-btn" data-preset="classic">CLASSIC</button>
          <button class="pj-btn" data-preset="moon">MOON</button>
          <button class="pj-btn" data-preset="flubber">FLUBBER</button>
          <button class="pj-btn" data-preset="brick">BRICK</button>
        </div>
        <div class="pj-actions">
          <button class="pj-btn" id="pjSound">SOUND: ON</button>
          <button class="pj-btn" id="pjDone">DONE</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
"use strict";
var wrap=document.getElementById('pjWrap');
var canvas=document.getElementById('pjCanvas'),ctx=canvas.getContext('2d');
var panel=document.getElementById('pjPanel'),menuBtn=document.getElementById('pjMenuBtn');
var doneBtn=document.getElementById('pjDone'),soundBtn=document.getElementById('pjSound');

var DEF={gravity:1800,bounce:0.92,size:22,power:1,drag:0,paddleW:110};
var PRESETS={
 classic:DEF,
 moon:{gravity:500,bounce:0.97,size:22,power:1,drag:0,paddleW:110},
 flubber:{gravity:1500,bounce:1.08,size:18,power:1.15,drag:0.03,paddleW:120},
 brick:{gravity:2600,bounce:0.55,size:28,power:1.7,drag:0,paddleW:130}
};
var S=Object.assign({},DEF);
var soundOn=true;

var W=0,H=0;
var paddle={x:0,y:0,w:S.paddleW,h:14,vx:0,vy:0};
var ball={x:0,y:0,vx:0,vy:0,r:S.size/2};
var target={x:0,y:0};
var state='ready';
var score=0,best=0,paused=false;

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function resize(){
  var cw=Math.max(280,Math.min(718,wrap.clientWidth))-2;
  var ch=Math.round(clamp(cw*0.72,400,560));
  if(cw===W&&ch===H)return;
  var ow=W,oh=H;
  W=cw;H=ch;
  var dpr=Math.min(2,window.devicePixelRatio||1);
  canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(ow>0){var sx=W/ow,sy=H/oh;paddle.x*=sx;paddle.y*=sy;ball.x*=sx;ball.y*=sy;target.x*=sx;target.y*=sy;}
  else{paddle.x=W/2;paddle.y=H*0.78;target.x=paddle.x;target.y=paddle.y;ball.x=W/2;ball.y=H*0.4;}
}

var AC=null;
function initAudio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){AC=null;}}
  if(AC&&AC.state==='suspended'){AC.resume();}
}
function beep(freq,dur,vol){
  if(!soundOn||!AC)return;
  try{
    var t=AC.currentTime,o=AC.createOscillator(),g=AC.createGain();
    o.type='square';o.frequency.value=freq;
    g.gain.setValueAtTime(vol||0.04,t);
    g.gain.exponentialRampToValueAtTime(0.0008,t+(dur||0.05));
    o.connect(g);g.connect(AC.destination);
    o.start(t);o.stop(t+(dur||0.05)+0.02);
  }catch(e){}
}

function setTarget(x,y,isTouch){
  target.x=clamp(x,paddle.w/2,W-paddle.w/2);
  target.y=clamp(y+(isTouch?-64:0),H*0.25,H-20);
}
function localPos(e){var r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
canvas.addEventListener('pointermove',function(e){var p=localPos(e);setTarget(p.x,p.y,e.pointerType==='touch');});
canvas.addEventListener('pointerdown',function(e){
  initAudio();
  try{canvas.setPointerCapture(e.pointerId);}catch(err){}
  var p=localPos(e);setTarget(p.x,p.y,e.pointerType==='touch');
  if(state!=='play'){serve();}
});

function serve(){
  score=0;
  ball.x=target.x;
  ball.y=Math.max(30,target.y-Math.max(140,H*0.3));
  ball.vx=(Math.random()*2-1)*80;
  ball.vy=0;
  state='play';
  beep(340,0.05);
}
function miss(){
  state='over';
  if(score>best)best=score;
  beep(170,0.12);
  setTimeout(function(){beep(110,0.25);},100);
}

function wallBounce(){
  var r=ball.r,wr=clamp(S.bounce,0.5,0.98);
  if(ball.x-r<0){ball.x=r;if(ball.vx<0){ball.vx=-ball.vx*wr;beep(230,0.04);}}
  else if(ball.x+r>W){ball.x=W-r;if(ball.vx>0){ball.vx=-ball.vx*wr;beep(230,0.04);}}
  if(ball.y-r<0){ball.y=r;if(ball.vy<0){ball.vy=-ball.vy*wr;beep(230,0.04);}}
}
function paddleHit(prevTop,prevBB){
  var r=ball.r,half=paddle.w/2,top=paddle.y-paddle.h/2;
  if(ball.x+r<paddle.x-half||ball.x-r>paddle.x+half)return;
  var relVy=ball.vy-paddle.vy;
  if(relVy<=0)return;
  var bb=ball.y+r;
  var crossed=prevBB<=prevTop+0.6&&bb>=top;
  var inside=bb>=top&&ball.y<paddle.y+paddle.h;
  if(!crossed&&!inside)return;
  var pvy=paddle.vy*S.power;
  var rel=ball.vy-pvy;
  if(rel<90&&Math.abs(paddle.vy)<260){
    ball.y=top-r;
    ball.vy=paddle.vy;
    ball.vx=ball.vx*0.9+paddle.vx*0.1;
    return;
  }
  ball.vy=pvy-S.bounce*rel;
  var off=clamp((ball.x-paddle.x)/half,-1,1);
  ball.vx=ball.vx*0.72+paddle.vx*0.55*S.power+off*180;
  ball.vx=clamp(ball.vx,-1500,1500);
  ball.vy=clamp(ball.vy,-3200,3200);
  ball.y=top-r-0.5;
  score++;
  beep(460,0.05);
}

var last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt=(now-last)/1000;last=now;
  if(paused){draw();return;}
  dt=Math.min(dt,0.033);
  if(dt<=0){draw();return;}
  var k=1-Math.exp(-28*dt);
  var px0=paddle.x,py0=paddle.y;
  var ex=px0+(target.x-px0)*k,ey=py0+(target.y-py0)*k;
  paddle.vx=paddle.vx*0.5+((ex-px0)/dt)*0.5;
  paddle.vy=paddle.vy*0.5+((ey-py0)/dt)*0.5;
  var steps=Math.max(1,Math.ceil(dt/0.008)),sdt=dt/steps;
  for(var i=1;i<=steps;i++){
    var prevTop=paddle.y-paddle.h/2,prevBB=ball.y+ball.r;
    paddle.x=px0+(ex-px0)*i/steps;
    paddle.y=py0+(ey-py0)*i/steps;
    if(state==='play'){
      ball.vy+=S.gravity*sdt;
      var d=Math.max(0,1-S.drag*1.5*sdt);
      ball.vx*=d;ball.vy*=d;
      ball.x+=ball.vx*sdt;
      ball.y+=ball.vy*sdt;
      wallBounce();
      paddleHit(prevTop,prevBB);
      if(ball.y-ball.r>H){miss();}
    }else if(state==='ready'){
      ball.x+=(paddle.x-ball.x)*Math.min(1,10*sdt);
      ball.y=paddle.y-Math.max(140,H*0.3);
    }
  }
  draw();
}

var FONT={'0':[7,5,5,5,7],'1':[2,6,2,2,7],'2':[7,1,7,4,7],'3':[7,1,7,1,7],'4':[5,5,7,1,1],'5':[7,4,7,1,7],'6':[7,4,7,5,7],'7':[7,1,1,1,1],'8':[7,5,7,5,7],'9':[7,5,7,1,7]};
function drawNum(str,cx,y,cell){
  var x=cx-((str.length*4-1)*cell)/2;
  for(var c=0;c<str.length;c++){
    var rows=FONT[str.charAt(c)];
    if(rows){for(var ry=0;ry<5;ry++){for(var bx=0;bx<3;bx++){if(rows[ry]&(1<<(2-bx))){ctx.fillRect(x+bx*cell,y+ry*cell,cell,cell);}}}}
    x+=4*cell;
  }
}
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';
  ctx.fillRect(paddle.x-paddle.w/2,paddle.y-paddle.h/2,paddle.w,paddle.h);
  if(state!=='over'){ctx.fillRect(ball.x-ball.r,ball.y-ball.r,ball.r*2,ball.r*2);}
  drawNum(String(score),W/2,14,7);
  ctx.textAlign='left';ctx.font='bold 13px "Courier New",monospace';
  ctx.fillText('BEST '+best,12,24);
  var bl=(performance.now()/1000)%1<0.65;
  ctx.textAlign='center';
  if(state==='ready'){
    if(bl){ctx.font='bold 17px "Courier New",monospace';ctx.fillText('CLICK OR TAP TO SERVE',W/2,H*0.30);}
    ctx.globalAlpha=0.7;ctx.font='11px "Courier New",monospace';
    ctx.fillText('MOVE THE PADDLE TO JUGGLE THE BALL',W/2,H*0.30+24);
    ctx.fillText('FLICK UP FOR POWER - EASE DOWN TO CUSHION',W/2,H*0.30+40);
    ctx.globalAlpha=1;
  }else if(state==='over'){
    ctx.font='bold 38px "Courier New",monospace';ctx.fillText('MISS',W/2,H*0.4);
    if(bl){ctx.font='bold 14px "Courier New",monospace';ctx.fillText('TAP TO SERVE AGAIN',W/2,H*0.4+30);}
  }
}

menuBtn.addEventListener('click',function(){panel.hidden=false;paused=true;});
doneBtn.addEventListener('click',function(){panel.hidden=true;paused=false;last=performance.now();});
soundBtn.addEventListener('click',function(){soundOn=!soundOn;if(soundOn)initAudio();soundBtn.textContent='SOUND: '+(soundOn?'ON':'OFF');});

var sliders=[
 ['pjGravity','gravity',function(v){return String(Math.round(v));}],
 ['pjBounce','bounce',function(v){return v.toFixed(2);}],
 ['pjSize','size',function(v){return Math.round(v)+'px';}],
 ['pjPower','power',function(v){return v.toFixed(2)+'x';}],
 ['pjDrag','drag',function(v){return v.toFixed(2);}],
 ['pjWidth','paddleW',function(v){return Math.round(v)+'px';}]
];
function applyS(){ball.r=S.size/2;paddle.w=S.paddleW;}
function syncUI(){
  sliders.forEach(function(cfg){
    document.getElementById(cfg[0]).value=S[cfg[1]];
    document.getElementById(cfg[0]+'V').textContent=cfg[2](S[cfg[1]]);
  });
  applyS();
}
sliders.forEach(function(cfg){
  document.getElementById(cfg[0]).addEventListener('input',function(){
    S[cfg[1]]=parseFloat(this.value);
    document.getElementById(cfg[0]+'V').textContent=cfg[2](S[cfg[1]]);
    applyS();
  });
});
var pb=panel.querySelectorAll('[data-preset]');
for(var i=0;i<pb.length;i++){
  pb[i].addEventListener('click',function(){
    S=Object.assign({},PRESETS[this.getAttribute('data-preset')]);
    syncUI();
  });
}

if(window.ResizeObserver){new ResizeObserver(function(){resize();}).observe(wrap);}
window.addEventListener('resize',resize);
resize();syncUI();
requestAnimationFrame(function(t){last=t;requestAnimationFrame(frame);});
})();
</script>
